services:
  - type: web
    name: operblock
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:migrate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: APP_URL
        sync: false
