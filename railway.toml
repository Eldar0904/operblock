[build]
builder = "RAILPACK"
# Include devDependencies so Vite + drizzle-kit are available during build/migrate
buildCommand = "npm install --include=dev && npm run db:migrate && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
