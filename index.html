<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OperBlock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      window.REPLIT_APP_THEME_TOKENS = {
        colors: {
          background: "hsl(var(--background))",
          foreground: "hsl(var(--foreground))",
          border: "hsl(var(--border))",
          input: "hsl(var(--input))",
          ring: "hsl(var(--ring))",
          card: {
            DEFAULT: "hsl(var(--card))",
            foreground: "hsl(var(--card-foreground))",
            border: "hsl(var(--card-border))",
          },
          popover: {
            DEFAULT: "hsl(var(--popover))",
            foreground: "hsl(var(--popover-foreground))",
            border: "hsl(var(--popover-border))",
          },
          primary: {
            DEFAULT: "hsl(var(--primary))",
            foreground: "hsl(var(--primary-foreground))",
            border: "hsl(var(--primary-border))",
          },
          secondary: {
            DEFAULT: "hsl(var(--secondary))",
            foreground: "hsl(var(--secondary-foreground))",
            border: "hsl(var(--secondary-border))",
          },
          muted: {
            DEFAULT: "hsl(var(--muted))",
            foreground: "hsl(var(--muted-foreground))",
            border: "hsl(var(--muted-border))",
          },
          accent: {
            DEFAULT: "hsl(var(--accent))",
            foreground: "hsl(var(--accent-foreground))",
            border: "hsl(var(--accent-border))",
          },
          destructive: {
            DEFAULT: "hsl(var(--destructive))",
            foreground: "hsl(var(--destructive-foreground))",
            border: "hsl(var(--destructive-border))",
          },
          "chart-1": "hsl(var(--chart-1))",
          "chart-2": "hsl(var(--chart-2))",
          "chart-3": "hsl(var(--chart-3))",
          "chart-4": "hsl(var(--chart-4))",
          "chart-5": "hsl(var(--chart-5))",
          sidebar: {
            DEFAULT: "hsl(var(--sidebar))",
            foreground: "hsl(var(--sidebar-foreground))",
            border: "hsl(var(--sidebar-border))",
            primary: "hsl(var(--sidebar-primary))",
            "primary-foreground": "hsl(var(--sidebar-primary-foreground))",
            "primary-border": "hsl(var(--sidebar-primary-border))",
            accent: "hsl(var(--sidebar-accent))",
            "accent-foreground": "hsl(var(--sidebar-accent-foreground))",
            "accent-border": "hsl(var(--sidebar-accent-border))",
            ring: "hsl(var(--sidebar-ring))",
          },
        },
        fontFamily: {
          sans: ["var(--app-font-sans)"],
          serif: ["var(--app-font-serif)"],
          mono: ["var(--app-font-mono)"],
        },
        borderRadius: {
          sm: "calc(var(--radius) - 4px)",
          md: "calc(var(--radius) - 2px)",
          lg: "var(--radius)",
          xl: "calc(var(--radius) + 4px)",
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
